<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">

<head>
    <meta charset="UTF-8">
    <title>Register</title>
    <link rel="icon" type="image/svg+xml" th:href="@{/favicon.svg}" href="/favicon.svg">
</head>

<body>
    <h2>Create Account</h2>

    <div th:if="${param.error == 'missing'}" style="color: red;">
        Please fill in all fields.
    </div>
    <div th:if="${param.error == 'passwordMismatch'}" style="color: red;">
        Password and confirm password do not match.
    </div>
    <div th:if="${param.error == 'usernameExists'}" style="color: red;">
        Username is already taken.
    </div>
    <div th:if="${param.error == 'emailExists'}" style="color: red;">
        Email is already registered.
    </div>

    <form action="/register" method="post">
        <div>
            <label for="username">Username:</label>
            <input type="text" id="username" name="username" required />
        </div>
        <div>
            <label for="email">Email:</label>
            <input type="email" id="email" name="email" required />
        </div>
        <div>
            <label for="password">Password:</label>
            <input type="password" id="password" name="password" required />
        </div>
        <div>
            <label for="confirmPassword">Confirm Password:</label>
            <input type="password" id="confirmPassword" name="confirmPassword" required />
        </div>
        <div>
            <button type="submit">Register</button>
        </div>
    </form>

    <a href="/login">Back to Login</a>
</body>

</html>
