<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">

<head>
    <meta charset="UTF-8">
    <title>Login</title>
    <link rel="icon" type="image/svg+xml" th:href="@{/favicon.svg}" href="/favicon.svg">
</head>

<body>
    <h2>Login</h2>

    <div th:if="${param.error}" style="color: red;">
        Invalid username or password.
    </div>
    <div th:if="${param.logout}" style="color: green;">
        You have been logged out.
    </div>
    <div th:if="${param.emailSent}" style="color: green;">
        If the email exists, a reset link has been sent.
    </div>
    <div th:if="${param.mailError}" style="color: red;">
        Unable to send reset email right now. Please try again later.
    </div>

    <form th:action="@{/login}" method="post">
        <div>
            <label for="username">Username:</label>
            <input type="text" id="username" name="username" />
        </div>
        <div>
            <label for="password">Password:</label>
            <input type="password" id="password" name="password" />
        </div>
        <div>
            <button type="submit">Login</button>
        </div>

        <a href="/forgot-password">Forgot password?</a>
    </form>
</body>

</html>
